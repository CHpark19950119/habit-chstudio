name: cheonhong_studio
description: CHEONHONG STUDIO - Android
publish_to: 'none'
version: 10.14.5+6

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.4.0
  cloud_firestore: ^6.1.2
  flutter_local_notifications: ^18.0.0
  timezone: ^0.10.1
  flutter_foreground_task: ^9.2.0
  # ★ AUDIT FIX: P-05, D-01 — provider 제거 (미사용)
  # provider: ^6.1.1
  cupertino_icons: ^1.0.6
  google_fonts: ^8.0.2
  intl: ^0.20.2
  shared_preferences: ^2.5.4

  # ★ AUDIT FIX: P-05, D-01 — nfc_manager 제거 (NFC 시스템 삭제됨)
  # nfc_manager: 3.5.0
  http: ^1.6.0
  home_widget: ^0.7.0
  lottie: ^3.1.0
  firebase_messaging: ^16.1.2
  flame: ^1.21.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  # ★ AUDIT FIX: P-05, D-01 — sensors_plus 제거 (미사용)
  # sensors_plus: ^6.1.1
  path_provider: ^2.1.1
  app_links: ^7.0.0
  objectbox: ^5.3.1
  objectbox_flutter_libs: any

  # Health Connect (Samsung Health → 취침/기상 sleep session 읽기, 2026-04-19 추가)
  health: ^13.3.1




dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  objectbox_generator: ^5.3.1
  build_runner: ^2.4.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/daily_1024.png"
  adaptive_icon_background: "#b8862d"
  adaptive_icon_foreground: "assets/icon/daily_fg.png"

flutter:
  uses-material-design: true

  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Regular.otf
          weight: 400
        - asset: assets/fonts/Pretendard-Medium.otf
          weight: 500
        - asset: assets/fonts/Pretendard-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Pretendard-Bold.otf
          weight: 700

  assets:
    - assets/Book_Loader.json
    - assets/books_focus.json
    - assets/image/
    - assets/roadmap/
    - assets/허락_전반_01-05.html
    - assets/허락_후반_06-11.html
  