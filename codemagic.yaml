workflows:
  android-release:
    name: Android Release APK
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      flutter: 3.41.3
      java: 17
    triggering:
      events: []
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
    publishing:
      email:
        recipients:
          - cjsghd8064@gmail.com
        notify:
          success: true
          failure: true
